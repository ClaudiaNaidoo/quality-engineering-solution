name: QE Test Pipeline

on:
  push:
  pull_request:

concurrency:
  group: playwright-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js (LTS)
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

  api-tests:
    name: API tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js (LTS)
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run API tests
        run: npx playwright test --project=api
        env:
          CI: true

      - name: Upload Monocart report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: monocart-report-api
          path: monocart-report/
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-api
          path: playwright-report/
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-api
          path: test-results/
          if-no-files-found: ignore
          retention-days: 14

      - name: Print failure message
        if: failure()
        run: echo "API tests failed. Check uploaded reports."

  ui-tests:
    name: UI tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js (LTS)
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run UI tests
        run: npx playwright test --project=ui
        env:
          CI: true

      - name: Upload Monocart report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: monocart-report-ui
          path: monocart-report/
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-ui
          path: playwright-report/
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-ui
          path: test-results/
          if-no-files-found: ignore
          retention-days: 14

      - name: Print failure message
        if: failure()
        run: echo "UI tests failed. Check uploaded reports."
